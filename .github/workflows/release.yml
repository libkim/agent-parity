name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./...
      - run: go test -tags configeditor ./...
      - run: ./build.sh
        env:
          VERSION: ${{ github.ref_name }}
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
